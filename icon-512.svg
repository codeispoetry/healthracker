<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cross512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f8f8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <rect x="21" y="21" width="470" height="470" fill="url(#bg512)" stroke="#388E3C" stroke-width="8"/>
  
  <!-- Medical cross -->
  <g fill="url(#cross512)">
    <!-- Vertical bar -->
    <rect x="204" y="130" width="104" height="252" rx="20" ry="20"/>
    <!-- Horizontal bar -->
    <rect x="130" y="204" width="252" height="104" rx="20" ry="20"/>
  </g>
  
  <!-- Heart pulse line -->
  <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round">
    <path d="M80 340 L110 340 L125 310 L140 370 L155 270 L170 390 L185 320 L200 340 L432 340" opacity="0.8"/>
  </g>
  
  <!-- Small health symbols -->
  <g fill="#ffffff" opacity="0.7">
    <!-- Stethoscope symbol top-right -->
    <circle cx="350" cy="162" r="12"/>
    <path d="M338 150 Q320 135 300 150 Q320 165 338 150" stroke="#ffffff" stroke-width="6" fill="none"/>
    
    <!-- Heart symbol bottom-left -->
    <path d="M162 340 C162 325, 132 325, 132 340 C132 325, 102 325, 102 340 C102 365, 132 395, 132 395 C132 395, 162 365, 162 340 Z"/>
  </g>
</svg>