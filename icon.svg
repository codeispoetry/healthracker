<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f8f8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <rect x="4" y="4" width="184" height="184" fill="url(#bg)" stroke="#388E3C" stroke-width="3"/>
  
  <!-- Medical cross -->
  <g fill="url(#cross)">
    <!-- Vertical bar -->
    <rect x="76" y="46" width="40" height="100" rx="8" ry="8"/>
    <!-- Horizontal bar -->
    <rect x="46" y="76" width="100" height="40" rx="8" ry="8"/>
  </g>
  
  <!-- Heart pulse line -->
  <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
    <path d="M30 130 L40 130 L45 115 L50 145 L55 100 L60 150 L65 120 L70 130 L162 130" opacity="0.8"/>
  </g>
  
  <!-- Small health symbols -->
  <g fill="#ffffff" opacity="0.7">
    <!-- Stethoscope symbol top-right -->
    <circle cx="130" cy="62" r="4"/>
    <path d="M126 58 Q120 52 115 58 Q120 64 126 58" stroke="#ffffff" stroke-width="2" fill="none"/>
    
    <!-- Heart symbol bottom-left -->
    <path d="M62 130 C62 125, 52 125, 52 130 C52 125, 42 125, 42 130 C42 140, 52 150, 52 150 C52 150, 62 140, 62 130 Z"/>
  </g>
</svg>